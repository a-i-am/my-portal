<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIAM - Dev Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #10b981; }
        .md-body h1 { font-size: 1.8rem; font-weight: bold; margin: 1.5em 0 0.5em; color: var(--accent); }
        .md-body h2 { font-size: 1.4rem; font-weight: bold; margin: 1.2em 0 0.4em; }
        .md-body p { margin-bottom: 1em; line-height: 1.7; color: #d4d4d8; }
        .md-body pre { background: #09090b; padding: 1rem; border-radius: 0.5rem; border: 1px solid #27272a; overflow-x: auto; margin: 1em 0; }
    </style>
</head>
<body class="bg-[#111113] text-zinc-100 flex min-h-screen font-sans">

    <aside class="w-64 bg-[#18181b] border-r border-zinc-800 p-6 flex flex-col shrink-0 sticky top-0 h-screen">
        <h1 class="text-xl font-bold tracking-wider text-[#10b981]" id="title-color">aiam.dev</h1>
        <p class="text-xs text-zinc-400 mt-1">Client Programmer & Bio-Art</p>
        
        <nav class="mt-8 flex flex-col gap-2 text-sm">
            <a href="#" onclick="switchTab('home')" class="p-2 hover:bg-zinc-800 rounded text-zinc-300">🏠 Home</a>
            <a href="#" onclick="switchTab('portfolio')" class="p-2 hover:bg-zinc-800 rounded text-zinc-300">📂 Portfolio</a>
            <a href="#" onclick="switchTab('blog')" class="p-2 hover:bg-zinc-800 rounded text-zinc-300">📝 Tech & TIL</a>
            <a href="/admin/index.html" target="_blank" class="mt-4 p-2 bg-zinc-800/50 hover:bg-zinc-800 text-xs text-center border border-zinc-700 rounded text-amber-400">🔒 CMS 글쓰기</a>
        </nav>

        <div class="mt-auto border-t border-zinc-800 pt-4 text-xs">
            <span class="text-zinc-400">🎨 포인트 컬러</span>
            <div class="flex gap-2 mt-2">
                <button onclick="changeColor('#10b981')" class="w-4 h-4 rounded-full bg-[#10b981]"></button>
                <button onclick="changeColor('#3b82f6')" class="w-4 h-4 rounded-full bg-[#3b82f6]"></button>
                <button onclick="changeColor('#f59e0b')" class="w-4 h-4 rounded-full bg-[#f59e0b]"></button>
                <button onclick="changeColor('#ec4899')" class="w-4 h-4 rounded-full bg-[#ec4899]"></button>
            </div>
        </div>
    </aside>

    <main class="flex-1 p-10 max-w-4xl">
        <div id="tab-home" class="tab-content block">
            <h2 class="text-2xl font-bold">Welcome to my space.</h2>
            <p class="text-zinc-400 mt-2">서버리스 CMS와 정적 호스팅이 결합된 개발 블로그입니다.</p>
        </div>

        <div id="tab-portfolio" class="tab-content hidden">
            <h2 class="text-2xl font-bold mb-6">Game Client Portfolio</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-[#18181b] p-4 rounded border border-zinc-800">
                    <div class="h-32 bg-zinc-800 rounded flex items-center justify-center text-zinc-500 font-bold">Project LUP</div>
                    <h3 class="font-bold mt-3">Project LUP v2025</h3>
                    <p class="text-xs text-zinc-400 mt-1">C# 기반 모듈형 게임 시스템 설계</p>
                </div>
            </div>
        </div>

        <div id="tab-blog" class="tab-content hidden">
            <h2 class="text-2xl font-bold mb-6">Tech Log & TIL</h2>
            <div id="post-list" class="flex flex-col gap-4"></div>
        </div>

        <div id="tab-reader" class="tab-content hidden">
            <button onclick="switchTab('blog')" class="text-sm text-[#10b981] mb-6">← 목록으로 돌아가기</button>
            <article id="md-view" class="md-body"></article>
        </div>
    </main>

    <aside id="toc-panel" class="w-56 p-8 hidden md:block border-l border-zinc-800/50 text-xs sticky top-0 h-screen">
        <p class="font-bold text-zinc-400 mb-3">목차 (TOC)</p>
        <div id="toc-list" class="flex flex-col gap-2 text-zinc-500"></div>
    </aside>

    <script>
        // 1. 깃허브 API에서 posts 폴더의 파일 목록을 읽어오는 로직
        const GITHUB_USER = "[본인깃허브아이디]";
        const GITHUB_REPO = "[레포지토리이름]";
        
        async function fetchPosts() {
            const listEl = document.getElementById('post-list');
            listEl.innerHTML = '<p class="text-zinc-500">깃허브에서 글 목록을 불러오는 중...</p>';
            
            try {
                // 깃허브 API를 통해 posts 폴더 내의 파일들을 조회
                const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/posts`);
                const files = await res.json();
                
                listEl.innerHTML = '';
                for(const file of files) {
                    if(file.name.endsWith('.md')) {
                        const item = document.createElement('div');
                        item.className = "p-4 bg-[#18181b] border border-zinc-800 hover:border-[#10b981] cursor-pointer rounded transition";
                        item.onclick = () => loadPost(file.download_url);
                        item.innerHTML = `<h3 class="font-bold text-lg">${file.name.replace('.md', '')}</h3><p class="text-xs text-zinc-500 mt-1">GitHub 저장소 연동 문서</p>`;
                        listEl.appendChild(item);
                    }
                }
            } catch(e) {
                listEl.innerHTML = '<p class="text-rose-500">글 목록을 불러오지 못했습니다. config.yml의 깃허브 경로를 확인해주세요.</p>';
            }
        }

        async function loadPost(url) {
            switchTab('reader');
            const res = await fetch(url);
            const text = await res.text();
            
            // Frontmatter (---) 제거 후 본문만 파싱
            const cleanText = text.replace(/^---[\s\S]+?---/, '');
            const view = document.getElementById('md-view');
            view.innerHTML = marked.parse(cleanText);
            hljs.highlightAll();

            // 목차 생성
            const toc = document.getElementById('toc-list');
            toc.innerHTML = '';
            view.querySelectorAll('h1, h2').forEach((h, idx) => {
                h.id = `toc-${idx}`;
                const a = document.createElement('a');
                a.href = `#toc-${idx}`;
                a.innerText = h.innerText;
                a.className = "hover:text-[#10b981] transition truncate";
                a.onclick = (e) => { e.preventDefault(); h.scrollIntoView({behavior:'smooth'}); };
                toc.appendChild(a);
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            if(tab === 'blog') fetchPosts();
        }

        function changeColor(hex) {
            document.documentElement.style.setProperty('--accent', hex);
            document.getElementById('title-color').style.color = hex;
            localStorage.setItem('my_color', hex);
        }

        window.onload = () => {
            const saved = localStorage.getItem('my_color');
            if(saved) changeColor(saved);
        };
    </script>
</body>
</html>
