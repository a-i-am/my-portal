name: Deploy to Neocities

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload static site
        env:
          NEOCITIES_API_KEY: ${{ secrets.NEOCITIES_API_KEY }}
        run: |
          test -n "$NEOCITIES_API_KEY"
          
          ARGS=()
          ARGS+=("-F" "index.html=@index.html")
          ARGS+=("-F" "css/style.css=@css/style.css")
          ARGS+=("-F" "js/app.js=@js/app.js")
          ARGS+=("-F" "Blog Profile.png=@Blog Profile.png")
          
          for file in posts/*; do
            if [ -f "$file" ]; then
              ARGS+=("-F" "$file=@$file")
            fi
          done
          
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $NEOCITIES_API_KEY" \
            "${ARGS[@]}" \
            https://neocities.org/api/upload
